# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Local Promptfoo E2E smoke evals

providers:
  - openai:chat:gpt-5.5

prompts:
  - |
    You are checking a local end-to-end evaluation workflow for this repository.

    Repository rule:
    Promptfoo E2E runs are local-only. They must use the pinned package script, avoid committing generated reports by default, and require provider secrets before running paid model calls.

    User request:
    {{request}}

    Return exactly these two lines:
    COMMAND: <the npm command to run>
    WARNING: <short warning>

tests:
  - description: local e2e command points to pinned npm script
    vars:
      request: Run the Promptfoo end-to-end eval locally.
    assert:
      - type: contains
        value: "COMMAND: npm run eval:e2e"
      - type: icontains
        value: "secrets"
