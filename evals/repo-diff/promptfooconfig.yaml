# Repo-diff Promptfoo evaluation config
#
# Uses the Python provider in stub mode (no API keys needed).
# Set PROMPTFOO_REPO_DIFF_AGENT=1 to enable real-agent mode.

providers:
  - id: file://provider.py
    config:
      # agentCommand: "your-agent-command-here"  # only used when PROMPTFOO_REPO_DIFF_AGENT=1

prompts:
  - "Apply the {{skill}} skill to the {{fixture}} project."

tests:
  - description: "TDD skill produces test file and refactors index.js"
    vars:
      fixture: mini-js-project
      skill: test-driven-development
      stub_patch: tdd.patch
    assert:
      # Diff must touch index.js
      - type: javascript
        value: "output.includes('diff --git a/index.js b/index.js')"

      # Diff must create a new test file
      - type: javascript
        value: "output.includes('diff --git a/index.test.js b/index.test.js')"

      # Diff must add a function definition
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('function'))"

      # Diff must add module.exports
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('module.exports'))"

      # Metadata: stub mode
      - type: javascript
        value: "context.providerResponse.metadata.mode === 'stub'"

      # Metadata: correct fixture
      - type: javascript
        value: "context.providerResponse.metadata.fixture === 'mini-js-project'"

      # Metadata: changed_file_count is 2
      - type: javascript
        value: "context.providerResponse.metadata.changed_file_count === 2"

  - description: "Coding-standards skill adds error handling"
    vars:
      fixture: mini-js-project
      skill: coding-standards
      stub_patch: coding-standards.patch
    assert:
      # Diff must touch index.js
      - type: javascript
        value: "output.includes('diff --git a/index.js b/index.js')"

      # Diff must NOT create new files (only modifies index.js)
      - type: javascript
        value: "!output.includes('diff --git a/index.test.js') && output.split('\\n').filter(l => l.startsWith('diff --git')).length === 1"

      # Diff must add a try/catch block
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('try'))"

      # Diff must add error handling (catch)
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('catch'))"

      # Diff must add a function wrapping the read
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('function'))"

      # Metadata: stub mode
      - type: javascript
        value: "context.providerResponse.metadata.mode === 'stub'"

      # Metadata: changed_file_count is 1
      - type: javascript
        value: "context.providerResponse.metadata.changed_file_count === 1"

  - description: "Coding-standards skill replaces O(n^2) find-in-loop with a Map index"
    vars:
      fixture: enrich-loop
      skill: coding-standards
      stub_patch: coding-standards-nplusone.patch
    assert:
      # Diff must touch enrich.js and only enrich.js
      - type: javascript
        value: "output.includes('diff --git a/enrich.js b/enrich.js')"
      - type: javascript
        value: "output.split('\\n').filter(l => l.startsWith('diff --git')).length === 1"

      # Diff must add a Map-based index
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('new Map('))"

      # Diff must use the index for lookup
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('customersById.get'))"

      # Diff must remove the linear .find() scan inside the loop
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('-') && !l.startsWith('---') && l.includes('.find('))"

      # Metadata: stub mode, single file changed
      - type: javascript
        value: "context.providerResponse.metadata.mode === 'stub'"
      - type: javascript
        value: "context.providerResponse.metadata.changed_file_count === 1"

  - description: "Alchemy skill removes Date.now() from a physical resource name"
    vars:
      fixture: alchemy-run
      skill: alchemy
      stub_patch: alchemy-deterministic-name.patch
    assert:
      # Diff must touch alchemy.run.ts and only that file
      - type: javascript
        value: "output.includes('diff --git a/alchemy.run.ts b/alchemy.run.ts')"
      - type: javascript
        value: "output.split('\\n').filter(l => l.startsWith('diff --git')).length === 1"

      # Diff must remove a line that used Date.now()
      - type: javascript
        value: "output.split('\\n').some(l => l.startsWith('-') && !l.startsWith('---') && l.includes('Date.now('))"

      # Diff must NOT reintroduce Date.now() on any added line
      - type: javascript
        value: "!output.split('\\n').some(l => l.startsWith('+') && !l.startsWith('+++') && l.includes('Date.now('))"

      # Metadata: stub mode, single file changed
      - type: javascript
        value: "context.providerResponse.metadata.mode === 'stub'"
      - type: javascript
        value: "context.providerResponse.metadata.changed_file_count === 1"
