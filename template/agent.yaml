spec_version: "0.1.0"
name: "{{project}}"
version: 0.1.0
description: "{{project_description}}"
author: "darkmatter"
license: proprietary
# Advisory / example fields below.
# No runtime in the darkmatter/skills ecosystem currently reads these.
# They are kept as structured defaults for projects that want a central
# place to record model and compliance preferences.  If your project
# doesn't need them, trim freely.
model:
  preferred: claude-opus-4-6
  fallback:
    - claude-sonnet-4-5-20250929
  constraints:
    temperature: 0.1
    max_tokens: 8192
skills: []
tools: []
delegation:
  mode: auto
runtime:
  max_turns: 50
  timeout: 300
# Compliance defaults — mirror the detailed templates in compliance/.
# Prefer editing compliance/risk-assessment.md and compliance/*.yaml
# for project-specific controls; the fields below are a summary only.
compliance:
  risk_tier: standard
  frameworks: []
  supervision:
    designated_supervisor: null
    review_cadence: quarterly
    human_in_the_loop: conditional
    escalation_triggers:
      - confidence_below: 0.7
      - error_detected: true
    override_capability: true
    kill_switch: true
  recordkeeping:
    audit_logging: true
    log_format: structured_json
    retention_period: 6y
    log_contents:
      - prompts_and_responses
      - tool_calls
      - decision_pathways
      - model_version
      - timestamps
    immutable: true
  model_risk:
    inventory_id: null
    validation_cadence: annual
    validation_type: full
    conceptual_soundness: null
    ongoing_monitoring: true
    outcomes_analysis: true
    drift_detection: true
    parallel_testing: false
  data_governance:
    pii_handling: redact
    data_classification: confidential
    consent_required: true
    cross_border: false
    bias_testing: true
    lda_search: false
  communications:
    type: correspondence
    pre_review_required: false
    fair_balanced: true
    no_misleading: true
    disclosures_required: false
  vendor_management:
    due_diligence_complete: false
    soc_report_required: false
    vendor_ai_notification: true
    subcontractor_assessment: false
tags: []
metadata: {}
