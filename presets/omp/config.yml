# Darkmatter omp (oh-my-pi) global settings.
#
# Installed to ~/.omp/agent/config.yml by scripts/install-omp.sh (copied, not
# symlinked, because omp mutates this file via `omp config set`). Tuned for
# autonomous, headless execution inside the github-executor container.
#
# Inspect the full schema and current values with `omp config list`.
providers: 
  webSearch: auto
  litellm: 
    baseUrl: https://litellm.drkmttr.dev/v1
    apiKey: LITELLM_API_KEY
    auth: apiKey
    api: openai-completions
    discovery: 
      type: openai-models-list
# --- Model roles -----------------------------------------------------------
# Default routing is the darkmatter LiteLLM gateway's `glm-local` alias
# (hosted_vllm/glm-5.2-fp8 — our own dedicated instance; needs LITELLM_API_KEY).
# Deliberately NOT `glm-5.2-fp8`: omp's discovery fuzzy-merges gateway model ids
# against the live models.dev catalog, and `glm-5.2-fp8` collides with the
# fireworks-ai entry `glm-5p2-fp8` — the SDK then puts the catalog's canonical
# wire id (accounts/fireworks/models/glm-5p2-fp8) in the request body, which
# LiteLLM 400s ("Invalid model name"). `glm-local` matches nothing in the
# catalog, so the alias goes on the wire unchanged. Diagnosed 2026-07-06 (all
# executor sessions returning "(agent produced no text)"). Frontier models
# (Claude/GPT via OpenRouter, OPENROUTER_API_KEY) stay on the `slow` role only.
modelRoles:
  default: "litellm/glm-local" # general turns / code changes
  smol: "litellm/glm-local" # cheap subagent fan-out
  slow: "anthropic/claude-fable-5" # deep reasoning (frontier)
  # vision:
  plan: "anthropic/claude-fable-5" # plan mode
  # designer:
  commit: "litellm/glm-local"
  task: "litellm/glm-local"
  advisor: "anthropic/claude-fable-5"

defaultThinkingLevel: medium

# --- Tool approval ---------------------------------------------------------
# The executor runs unattended: there is no human to answer approval prompts,
# so read/write/exec must auto-approve (yolo). Blast radius is contained by the
# executor itself — ephemeral per-job worktree, short-lived repo-scoped token,
# container resource + network-egress limits.
#
# SOFT destructive-command policy lives in RULES.md (always-apply). HARD,
# programmatic blocking of dangerous bash (rm -rf /, disk writes, fork bombs,
# curl|sh) is a safety hook delivered in Phase 6 hardening (platform-uyt.7).
tools:
  approvalMode: yolo
  approval:
    # Capabilities the unattended PR agent never needs:
    tts: deny
    generate_image: deny

# --- Behavior --------------------------------------------------------------
compaction:
  enabled: true # auto-compact long sessions

# Suppress interactive startup chrome in non-interactive/headless runs.
startup:
  quiet: true
