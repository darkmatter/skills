# Darkmatter omp model/provider config.
#
# Installed to ~/.omp/agent/models.yml by scripts/install-omp.sh.
#
# Primary provider is the darkmatter LiteLLM gateway — our own dedicated
# inference instance. `discovery: litellm` probes the proxy's management
# endpoints (/model_group/info, /v2/model/info, then /models) so the gateway's
# model list, context windows, and reasoning flags load automatically.
# Requires LITELLM_API_KEY in the environment.
#
# OpenRouter (built-in provider, OPENROUTER_API_KEY) stays available for the
# frontier-model `slow` role in config.yml.
#
# Schema + examples:
# https://github.com/can1357/oh-my-pi/blob/main/docs/models.md

providers:
  litellm:
    baseUrl: https://litellm.drkmttr.dev/v1
    apiKey: LITELLM_API_KEY # name of the env var holding the key
    api: openai-completions
    discovery:
      type: litellm
